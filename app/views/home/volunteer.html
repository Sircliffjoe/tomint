<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer & Scripture Sections</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #2ec443;
      --green-dark: #1fa832;
      --green-text: #1a8a2a;
      --white: #ffffff;
      --off-white: #f8f8f5;
      --dark: #1a1a1a;
      --muted: #555;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
    }

    /* ══════════════════════════════════════════════
       SECTION 1 — VOLUNTEER CTA (hero w/ bg image)
    ══════════════════════════════════════════════ */
    .volunteer-section {
      position: relative;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* Background image */
    .volunteer-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1600&q=80');
      background-size: cover;
      background-position: center top;
      filter: brightness(0.38);
      z-index: 0;
    }

    /* Subtle gradient darkening toward edges */
    .volunteer-section::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.5) 100%);
      z-index: 1;
    }

    .volunteer-content {
      position: relative;
      z-index: 2;
      padding: 72px 24px 80px;
      max-width: 680px;
    }

    .volunteer-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 2.9rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .volunteer-content p {
      color: rgba(255, 255, 255, 0.78);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 500px;
      margin: 0 auto 36px;
    }

    .btn-join {
      display: inline-block;
      background: var(--green);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 17px 42px;
      border: none;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      box-shadow: 0 6px 24px rgba(46, 196, 67, 0.35);
    }

    .btn-join:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(46, 196, 67, 0.45);
    }

    .btn-join:active {
      transform: translateY(0);
    }

    /* ══════════════════════════════════════════════
       SECTION 2 — ANCHOR SCRIPTURE
    ══════════════════════════════════════════════ */
    .scripture-section {
      background: var(--white);
      text-align: center;
      padding: 80px 24px 90px;
    }

    .scripture-label {
      font-family: 'Caveat', cursive;
      color: var(--green);
      font-size: 1.05rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
      display: block;
    }

    .scripture-ref {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 3.4rem);
      font-weight: 700;
      color: #1a3a22;
      line-height: 1.1;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }

    /* Decorative rule under the reference */
    .scripture-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .scripture-divider span {
      display: block;
      height: 1px;
      width: 60px;
      background: #d4e8d6;
    }

    .scripture-divider i {
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .scripture-verse {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 520px;
      margin: 0 auto;
      font-style: italic;
    }

    /* ── Fade-in entrance animation ── */
    .volunteer-content h2,
    .volunteer-content p,
    .btn-join,
    .scripture-label,
    .scripture-ref,
    .scripture-divider,
    .scripture-verse {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }

    .volunteer-content h2 {
      animation-delay: 0.1s;
    }

    .volunteer-content p {
      animation-delay: 0.25s;
    }

    .btn-join {
      animation-delay: 0.4s;
    }

    .scripture-label {
      animation-delay: 0.1s;
    }

    .scripture-ref {
      animation-delay: 0.25s;
    }

    .scripture-divider {
      animation-delay: 0.4s;
    }

    .scripture-verse {
      animation-delay: 0.5s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .volunteer-content {
        padding: 56px 20px 64px;
      }

      .scripture-section {
        padding: 60px 20px 70px;
      }
    }
  </style>
</head>

<body>

  <!-- ─── SECTION 1: VOLUNTEER CTA ─────────────────────── -->
  <section class="volunteer-section">
    <div class="volunteer-bg"></div>
    <div class="volunteer-content">
      <h2>Become A Proud Volunteer</h2>
      <p>
        Join us in shaping lives—your time and passion can make
        a lasting impact on teenagers.
      </p>
      <a href="#" class="btn-join">Join Now</a>
    </div>
  </section>

  <!-- ─── SECTION 2: ANCHOR SCRIPTURE ──────────────────── -->
  <section class="scripture-section">
    <span class="scripture-label">Anchor Scripture</span>
    <h2 class="scripture-ref">1 Timothy 4:12</h2>
    <div class="scripture-divider">
      <span></span><i></i><span></span>
    </div>
    <p class="scripture-verse">
      Let no one despise your youth, but be an example to the believers
      in word, in conduct, in love, in spirit, in faith, in purity.
    </p>
  </section>

</body>

</html>
